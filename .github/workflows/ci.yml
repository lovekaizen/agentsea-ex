name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - otp: "25.3"
            elixir: "1.18.4"
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo

      - name: Run tests
        run: mix test
        # The default suite is offline. Live integration tests are opt-in:
        #   mix test --include postgres   (needs Postgres + pgvector)
        #   mix test --include bumblebee  (downloads a Hugging Face model)

      - name: Dialyzer
        # Run in :dev — dialyxir is a :dev dependency, and dev's elixirc_paths
        # exclude test/support (intentionally-raising test helpers) from the PLT
        # analysis. Needs its own deps.get since the job-level MIX_ENV=test step
        # doesn't fetch :dev-only deps.
        env:
          MIX_ENV: dev
        run: |
          mix deps.get
          mix dialyzer
